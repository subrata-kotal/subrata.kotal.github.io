<!DOCTYPE html>
<html>
<head>
<title>Egg Booking - SK Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

header{
background:#ff9800;
color:white;
padding:20px;
font-size:22px;
}

.container{
background:white;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
max-width:400px;
margin-left:auto;
margin-right:auto;
}

input{
padding:10px;
margin:8px 0;
width:90%;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
background:#ff5722;
color:white;
border:none;
border-radius:6px;
width:95%;
cursor:pointer;
}

button:hover{
background:#e64a19;
}

.total{
font-weight:bold;
margin:10px;
color:green;
}
</style>
</head>

<body>

<header>🥚 Egg Booking</header>

<div class="container">

<input type="text" id="name" placeholder="Your Name">
<input type="number" id="fullQty" placeholder="Full Quantity">
<input type="number" id="halfQty" placeholder="Half Quantity">

<div class="total">
Total: ₹ <span id="totalAmount">0</span>
</div>

<button onclick="submitOrder()">Book Now</button>

</div>

<script>

const fullPrice = 8;
const halfPrice = 10;

document.getElementById("fullPrice").innerText = fullPrice;
document.getElementById("halfPrice").innerText = halfPrice;

function submitOrder() {

  let name = document.getElementById("name").value;
  let fullQty = parseInt(document.getElementById("fullQty").value) || 0;
  let halfQty = parseInt(document.getElementById("halfQty").value) || 0;

  if(name == ""){
    alert("Please enter your name");
    return;
  }

  let totalQty = fullQty + halfQty;
  let total = (fullQty * fullPrice) + (halfQty * halfPrice);

  fetch("https://script.google.com/macros/s/AKfycbzm3dahRGrWiunzoEruMqIrMNhvJSOwnaFxRoGhCkVB-d2yO5y7XrLqBz11uqw0ndo/exec", {
    method: "POST",
    body: JSON.stringify({
      product: "Egg",
      name: name,
      quantity: totalQty,
      total: total
    })
  })
  .then(res => res.text())
  .then(data => {
    alert("Order Saved Successfully!");
  });

}

</script>

</body>
</html>
